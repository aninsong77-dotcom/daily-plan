<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>물방울 매니저</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      touch-action: manipulation;
    }

    .room {
      position: relative;
      width: 100vw;
      height: 100dvh;
      min-height: 420px;
      display: grid;
      place-items: center;
      background: #fff;
    }

    .drop-zone {
      position: relative;
      width: min(54vw, 260px);
      min-width: 168px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .drop {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border: 0;
      border-radius: 50%;
      background: transparent;
      padding: 0;
      display: grid;
      place-items: center;
      filter: none;
      animation: breathe 5.2s ease-in-out infinite;
      cursor: pointer;
    }

    .drop:active {
      transform: scale(.985);
    }

    @keyframes breathe {
      0%, 100% { scale: 1; }
      50% { scale: .972; }
    }

    /* ── 기쁨: 통통 ── */
    .drop.happy {
      animation: happy-bounce 0.7s cubic-bezier(.36,.07,.19,.97) 2;
    }
    @keyframes happy-bounce {
      0%   { transform: translateY(0)    scaleX(1)    scaleY(1); }
      18%  { transform: translateY(-22%) scaleX(0.95) scaleY(1.05); }
      36%  { transform: translateY(0)    scaleX(1.08) scaleY(0.93); }
      54%  { transform: translateY(-12%) scaleX(0.97) scaleY(1.03); }
      72%  { transform: translateY(0)    scaleX(1.04) scaleY(0.97); }
      86%  { transform: translateY(-5%)  scaleX(1)    scaleY(1); }
      100% { transform: translateY(0)    scaleX(1)    scaleY(1); }
    }

    /* ── 슬픔: 흘러내리기 ── */
    .drop.sad {
      animation: sad-droop 2.8s ease-in-out infinite;
    }
    @keyframes sad-droop {
      0%, 100% { transform: scaleX(1)    scaleY(1)    translateY(0); }
      40%      { transform: scaleX(0.88) scaleY(1.14) translateY(5%); }
      70%      { transform: scaleX(0.90) scaleY(1.10) translateY(4%); }
    }

    /* ── 화남: 뾰족뾰족 + 떨림 ── */
    .drop.angry {
      filter: url(#f-angry);
      animation: angry-shake 0.12s ease-in-out infinite;
      overflow: visible; /* 뾰족한 부분이 원 밖으로 나오게 */
    }
    @keyframes angry-shake {
      0%, 100% { transform: translateX(0); }
      30%      { transform: translateX(-4px) rotate(-1deg); }
      70%      { transform: translateX( 4px) rotate( 1deg); }
    }

    .drop {
      overflow: hidden;
    }

    .drop video,
    .drop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.42);
      pointer-events: none;
      user-select: none;
    }

    .sr-status {
      position: fixed;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
    }

    /* 듣는 중 글로우 */
    .drop-zone.listening .drop {
      box-shadow:
        0 0 8px 3px rgba(120, 200, 255, 0.70),
        0 0 18px 6px rgba(100, 170, 255, 0.35);
      animation: breathe 5.2s ease-in-out infinite, glow-pulse 1.8s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 8px 3px rgba(120,200,255,0.70), 0 0 18px 6px rgba(100,170,255,0.35); }
      50%       { box-shadow: 0 0 14px 5px rgba(120,200,255,0.95), 0 0 26px 9px rgba(100,170,255,0.55); }
    }

    @media (max-width: 480px) {
      .drop-zone {
        width: min(68vw, 246px);
      }
    }
  </style>
</head>
<body>
  <!-- 화남 뾰족 필터 -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute;overflow:hidden;">
    <defs>
      <filter id="f-angry" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="3" seed="8" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
  <main class="room">
    <section class="drop-zone" id="dropZone" aria-label="물방울 매니저">
      <button class="drop" id="drop" aria-label="물방울을 눌러 일정 말하기">
        <video src="흰 배경에 완벽하게 동그란 아주 투명한 물방울 한 개, 극도로 투명하고 맑은 질감, 물방울이 원래 크기에서 아주 조금만 작아졌다가 다시 원래 크기로 돌아오는 부드러운 호흡 같은 움직임, 크기 변화는 매우 미세하고 자연스러움, 섬세한 반사광.mp4" poster="droplet.jpg" autoplay muted loop playsinline></video>
      </button>
    </section>
    <p class="sr-status" id="status" aria-live="polite">물방울 매니저가 준비됐어요.</p>
  </main>

  <script>
    const STORE_KEY = "droplet-manager-minimal-v1";
    const AI_ENDPOINT_KEY = "droplet-ai-endpoint";
    const DEFAULT_AI_ENDPOINT = "http://localhost:8787/parse";
    const CHECK_INTERVAL = 15000;

    const drop = document.getElementById("drop");
    const dropZone = document.getElementById("dropZone");
    const statusEl = document.getElementById("status");

    const pad = (n) => String(n).padStart(2, "0");
    const dateKey = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    const todayKey = () => dateKey(new Date());
    const id = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;

    let state = load();
    let recognition = null;
    let listening = false;
    let finalTranscript = "";
    let silenceTimer = null;
    let mode = "idle";

    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORE_KEY)) || { tasks: [] };
      } catch {
        return { tasks: [] };
      }
    }

    function save() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
      scheduleBrowserNotifications();
    }

    function setMode(next, text) {
      mode = next;
      dropZone.classList.toggle("listening", next === "listening");
      dropZone.classList.toggle("thinking", next === "thinking");
      statusEl.textContent = text || "";
    }

    function speak(text) {
      statusEl.textContent = text;
      if (!("speechSynthesis" in window)) return;
      speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "ko-KR";
      utterance.rate = .92;
      utterance.pitch = 1.02;
      speechSynthesis.speak(utterance);
    }

    function initVoice() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;
      recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.onresult = (event) => {
        let interim = "";
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const phrase = event.results[i][0].transcript.trim();
          if (event.results[i].isFinal) finalTranscript = `${finalTranscript} ${phrase}`.trim();
          else interim = `${interim} ${phrase}`.trim();
        }
        const heard = [finalTranscript, interim].filter(Boolean).join(" ").trim();
        if (heard) statusEl.textContent = heard;
        clearTimeout(silenceTimer);
        silenceTimer = setTimeout(() => finishListening(heard), 1700);
      };
      recognition.onerror = () => { setEmotion("angry", 2500); stopListening(); };
      recognition.onend = () => {
        if (!listening) return;
        try { recognition.start(); } catch {}
      };
    }

    async function startListening() {
      if (!recognition) {
        speak("이 브라우저에서는 음성 인식을 쓸 수 없어요.");
        return;
      }
      await prepareNotificationPermission();
      finalTranscript = "";
      listening = true;
      setMode("listening", "듣고 있어요.");
      speak("네, 말씀하세요.");
      try {
        recognition.start();
        navigator.vibrate?.(30);
      } catch {
        stopListening();
      }
    }

    function stopListening() {
      clearTimeout(silenceTimer);
      listening = false;
      try { recognition?.stop(); } catch {}
      setMode("idle", "물방울 매니저가 준비됐어요.");
    }

    async function finishListening(text) {
      const heard = (text || finalTranscript).trim();
      stopListening();
      if (!heard) return;
      setMode("thinking", "일정을 정리하고 있어요.");
      if (isBriefingRequest(heard)) {
        briefToday();
        setMode("idle", "브리핑을 마쳤어요.");
        return;
      }
      const tasks = await parseSpeech(heard);
      addTasks(tasks, heard);
      setMode("idle", "저장했어요.");
    }

    function isBriefingRequest(text) {
      return /오늘.*(뭐|일정|있어|브리핑)|브리핑|읽어줘|뭐\s*있어/.test(text);
    }

    async function parseSpeech(text) {
      const endpoint = localStorage.getItem(AI_ENDPOINT_KEY) || DEFAULT_AI_ENDPOINT;
      if (endpoint) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, today: todayKey(), locale: "ko-KR" })
          });
          if (response.ok) {
            const data = await response.json();
            if (Array.isArray(data.tasks)) return normalize(data.tasks, text);
          }
        } catch {}
      }
      return normalize(parseLocal(text), text);
    }

    function normalize(items, fallback) {
      return items.map((item) => ({
        id: id(),
        title: String(item.title || fallback).trim(),
        date: validDate(item.date) ? item.date : todayKey(),
        time: validTime(item.time) ? item.time : "",
        done: false,
        reminded: false,
        createdAt: Date.now()
      })).filter((item) => item.title);
    }

    function parseLocal(text) {
      return splitTasks(text).map(parseOne);
    }

    function splitTasks(text) {
      const parts = text.split(/\s*(?:그리고|그다음|다음에|,|，)\s*/g).map((part) => part.trim()).filter(Boolean);
      return parts.length ? parts : [text];
    }

    function parseOne(raw) {
      let title = raw.replace(/알려줘|챙겨줘|등록해줘|저장해줘|기억해줘|일정|예약/g, " ").replace(/\s+/g, " ").trim();
      const dateInfo = inferDate(title);
      title = dateInfo.title;
      const timeInfo = inferTime(title);
      title = timeInfo.title;
      title = title.replace(/오늘|내일|모레|오전|오후|아침|점심|저녁|밤/g, " ").replace(/\s+/g, " ").trim();
      return {
        title: title || raw,
        date: dateInfo.date,
        time: timeInfo.time
      };
    }

    function inferDate(text) {
      const date = new Date();
      let title = text;
      if (/모레/.test(text)) {
        date.setDate(date.getDate() + 2);
        title = title.replace(/모레/g, " ");
      } else if (/내일/.test(text)) {
        date.setDate(date.getDate() + 1);
        title = title.replace(/내일/g, " ");
      } else {
        title = title.replace(/오늘/g, " ");
      }
      return { date: dateKey(date), title };
    }

    function inferTime(text) {
      let title = text;
      let hour = null;
      let minute = 0;
      const pm = /오후|저녁|밤/.test(text);
      const am = /오전|아침/.test(text);
      const matched = text.match(/(\d{1,2})\s*시(?:\s*(\d{1,2})\s*분?)?/);
      if (matched) {
        hour = Number(matched[1]);
        minute = matched[2] ? Number(matched[2]) : 0;
        title = title.replace(matched[0], " ");
      } else if (/아침/.test(text)) {
        hour = 8;
      } else if (/점심/.test(text)) {
        hour = 12;
      } else if (/저녁/.test(text)) {
        hour = 18;
      } else if (/밤/.test(text)) {
        hour = 21;
      }
      if (hour === null) return { time: "", title };
      if (pm && hour < 12) hour += 12;
      if (am && hour === 12) hour = 0;
      return { time: `${pad(hour)}:${pad(minute)}`, title };
    }

    function setEmotion(emotion, duration = 3000) {
      drop.classList.remove("happy", "sad", "angry");
      void drop.offsetWidth;
      if (emotion) {
        drop.classList.add(emotion);
        setTimeout(() => drop.classList.remove(emotion), duration);
      }
    }

    function bounce() { setEmotion("happy", 1500); }

    // idle 상태에서 주기적으로 기쁘게 통통
    setInterval(() => { if (mode === "idle") bounce(); }, 9000);

    function addTasks(tasks, originalText) {
      if (!tasks.length) {
        setEmotion("sad", 3000);
        speak("제가 잘 못 들었어요. 다시 한번 말해 주세요.");
        return;
      }
      state.tasks.push(...tasks);
      save();
      bounce(); // 저장 성공 시 기뻐서 바운스
      const message = tasks.length === 1
        ? `${friendlyTask(tasks[0])} 저장했어요. 제가 챙길게요.`
        : `${tasks.length}개 일정 저장했어요. 제가 챙길게요.`;
      speak(message);
      navigator.vibrate?.([35, 60, 35]);
    }

    function briefToday() {
      const open = state.tasks
        .filter((task) => task.date === todayKey() && !task.done)
        .sort(compareTasks);
      if (!open.length) {
        speak("오늘은 남은 일정이 없어요. 제가 조용히 지켜볼게요.");
        return;
      }
      const details = open.slice(0, 5).map(friendlyTask).join(", ");
      speak(`오늘 남은 일정은 ${open.length}개예요. ${details}`);
    }

    function friendlyTask(task) {
      return `${task.time ? spokenTime(task.time) + " " : ""}${task.title}`;
    }

    function spokenTime(time) {
      const [hourRaw, minuteRaw] = time.split(":").map(Number);
      const ap = hourRaw < 12 ? "오전" : "오후";
      const hour = hourRaw === 0 ? 12 : hourRaw > 12 ? hourRaw - 12 : hourRaw;
      return `${ap} ${hour}시${minuteRaw ? ` ${minuteRaw}분` : ""}`;
    }

    function compareTasks(a, b) {
      if (a.time && b.time) return a.time.localeCompare(b.time);
      if (a.time) return -1;
      if (b.time) return 1;
      return a.createdAt - b.createdAt;
    }

    async function prepareNotificationPermission() {
      if (!("Notification" in window)) return;
      if (Notification.permission === "default") {
        try { await Notification.requestPermission(); } catch {}
      }
    }

    async function initServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      try {
        await navigator.serviceWorker.register("./sw.js");
        scheduleBrowserNotifications();
      } catch {}
    }

    async function scheduleBrowserNotifications() {
      if (Notification.permission !== "granted" || !("serviceWorker" in navigator)) return;
      const registration = await navigator.serviceWorker.ready.catch(() => null);
      const worker = registration?.active;
      if (!worker) return;
      for (const task of state.tasks) {
        worker.postMessage({ type: "CANCEL", id: task.id });
        if (task.done || !task.time) continue;
        const when = new Date(`${task.date}T${task.time}:00`);
        const delay = when.getTime() - Date.now();
        if (delay > 0 && delay < 2147483647) {
          worker.postMessage({
            type: "SCHEDULE",
            id: task.id,
            title: "물방울 매니저",
            body: `${friendlyTask(task)} 시간이에요.`,
            delay
          });
        }
      }
    }

    function checkDueTasks() {
      const now = new Date();
      const key = dateKey(now);
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      let changed = false;
      for (const task of state.tasks) {
        if (task.done || task.reminded || task.date !== key || !task.time) continue;
        const [hour, minute] = task.time.split(":").map(Number);
        const taskMinutes = hour * 60 + minute;
        if (currentMinutes >= taskMinutes) {
          task.reminded = true;
          changed = true;
          speak(`${friendlyTask(task)} 시간이에요. 이제 움직이시면 돼요.`);
          if (Notification.permission === "granted") {
            new Notification("물방울 매니저", { body: `${task.title} 시간이에요.` });
          }
          break;
        }
      }
      if (changed) save();
    }

    function validDate(value) {
      return /^\d{4}-\d{2}-\d{2}$/.test(String(value || ""));
    }

    function validTime(value) {
      return /^\d{2}:\d{2}$/.test(String(value || ""));
    }

    drop.addEventListener("click", () => {
      if (mode === "thinking") return;
      if (listening) stopListening();
      else startListening();
    });

    drop.addEventListener("dblclick", (event) => {
      event.preventDefault();
      briefToday();
    });

    window.dropletManager = {
      tasks: () => state.tasks.slice(),
      clear: () => { state = { tasks: [] }; save(); },
      setAiEndpoint: (url) => {
        localStorage.setItem(AI_ENDPOINT_KEY, url || "");
        speak(url ? "AI 해석 주소를 연결했어요." : "AI 해석 주소를 비웠어요.");
      }
    };

    initVoice();
    initServiceWorker();
    setMode("idle", "물방울 매니저가 준비됐어요.");
    setInterval(checkDueTasks, CHECK_INTERVAL);
  </script>
</body>
</html>
